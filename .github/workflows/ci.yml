name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Decode local.properties (if provided)
        # 本机构建依赖 Android SDK 路径；CI 可选通过 secret 注入 sdk.dir。
        # 未配置时仅运行与 SDK 无关的校验（shell 测试 + 编译在本地完成）。
        if: ${{ env.ANDROID_SDK_ROOT != '' }}
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Kotlin compile check
        if: ${{ env.ANDROID_SDK_ROOT != '' }}
        run: ./gradlew :app:compileDebugKotlin --no-daemon

      - name: Unit tests
        if: ${{ env.ANDROID_SDK_ROOT != '' }}
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Android Lint (baseline gate)
        if: ${{ env.ANDROID_SDK_ROOT != '' }}
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Shell test suite (assets/scripts)
        run: bash app/src/test/sh/run.sh

      - name: Harness check
        run: bash scripts/harness_check.sh
